<body>

<!-- existing header or navigation -->

<h1>Astitva Series Registry</h1>

<!-- PLACE SEARCH BOX HERE -->
<div style="margin:20px 0;">

<h2>Astitva Series Registry</h2>

<input type="text"
       id="registrySearch"
       placeholder="Search by title, identifier, or keyword..."
       style="width:100%;padding:10px;font-size:16px;margin-bottom:10px;">

<select id="domainFilter" style="padding:8px;font-size:15px;">
<option value="all">All Subject Domains</option>
<option value="Rig Vedic Studies">Rig Vedic Studies</option>
<option value="Upanishadic Thought">Upanishadic Thought</option>
<option value="Indian Philosophy">Indian Philosophical Systems</option>
<option value="Civilizational Studies">Civilizational Studies</option>
<option value="Logic and Epistemology">Logic and Epistemology</option>
<option value="Foundations of Mathematics">Foundations of Mathematics</option>
<option value="Foundations of Science">Foundations of Science</option>
<option value="Ayurveda">Ayurveda</option>
</select>

</div>
<!-- PLACE TABLE HERE -->
<table border="1" width="100%" cellspacing="0">

<thead>
<tr>
<th>Identifier</th>
<th>Citation</th>
<th>Title</th>
<th>Type</th>
<th>Collection</th>
<th>Domain</th>
<th>Link</th>
</tr>
</thead>

<tbody id="registry-table">
</tbody>

</table>
<!-- existing footer -->
<script>

let registryData = [];

fetch('registry.json')
  .then(response => response.json())
  .then(data => {

    registryData = data;
    renderTable(data);

  });

function renderTable(data){

  let table = document.getElementById("registry-table");
  table.innerHTML = "";

  data.forEach(item => {

    let row = document.createElement("tr");

    row.innerHTML =
      "<td>" + item.identifier + "</td>" +
      "<td>" + item.citation + "</td>" +
      "<td>" + item.title + "</td>" +
      "<td>" + item.type + "</td>" +
      "<td>" + item.collection + "</td>" +
      "<td>" + item.domain + "</td>" +
      "<td><a href='" + item.url + "'>View</a></td>";

    table.appendChild(row);

  });

}

</script>
</body>
